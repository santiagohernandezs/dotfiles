unbind r
bind r source-file "~/.config/tmux/tmux.conf" \; display-message "Config reloaded..."
source-file "~/.config/tmux/generated.conf"

set -g prefix C-b
set -g mouse on
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g default-terminal "${TERM}"
setw -g mode-keys vi
set -g status-bg default
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -ga terminal-features ",xterm-256color:RGB"
set-option -ga status-style "fg=default,bg=default"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key v split-window -v
bind-key 'V' split-window -h

bind-key n previous-window
bind-key m next-window

set-option -g status-position top

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'kristijan/tmux-fzf-pane-switch'

# Lazy tmux setup

run-shell -b 'lazy-tmux daemon --interval 3m --scrollback>/tmp/lazy-tmux.log 2>&1 || tmux display-message "lazy-tmux daemon already running"'
bind-key k display-popup -w 45% -h 50% -E 'lazy-tmux picker'
bind-key C-s run-shell 'lazy-tmux save --all --scrollback && tmux display-message "All sessions saved successfully!"'

# Minimal Tmux Status options
set -g @minimal-tmux-status "top"
set -g @minimal-tmux-justify "centre"
set -g @minimal-tmux-status-right-extra " #{USER}"

# Pop-up window
bind-key "G" display-popup -d "#{pane_current_path}" -h 80% -w 80% -E "lazygit"
bind-key "D" display-popup -d "#{pane_current_path}" -h 80% -w 80% -E "lazydocker"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOME/.local/opt/tmux/plugins/tpm/tpm'
